apis:
  - aid: lighthouse-travel:integration-api
    name: Lighthouse Integration API
    description: >-
      The Lighthouse Integration API (v3.1, previously the OTA Insight API)
      enables subscribed hotels and certified technology partners to create
      periodic custom data extracts from Lighthouse's hotel competitive
      intelligence dataset. Endpoints cover Hotels, Markets, Rates (current
      and historic, by hotel and by room type), Demand predictions, Ranking
      positions and summaries, Review summaries, Parity comparisons, Parity
      Insight market scoring, and Market Insight demand and search-volume
      forecasts (next 351 days). Authentication uses an account-bound API
      token passed as the X-Oi-Authorization header. Rate limits are 20
      requests per API per subscription per 24 hours and 120 requests per
      minute globally. Both JSON (default) and CSV output formats are
      supported, with optional gzip encoding. Access requires an active
      Lighthouse subscription; advanced endpoints (Live rateshopping, Raw
      Rates) require additional entitlements.
