aid: lighthouse-travel
name: Lighthouse
description: >-
  Lighthouse (formerly OTA Insight) is the commercial platform for the
  travel and hospitality industry, transforming data complexity into revenue
  growth for 80,000+ hotels across 185+ countries. Headquartered in London
  with offices across Europe, the Americas, and Asia-Pacific, Lighthouse
  combines market intelligence, business intelligence, and revenue
  management into a single SaaS suite. Core products include Rate Insight
  and Market Insight for competitive pricing and forward demand, Pricing
  Manager for automated revenue optimization, Benchmark Insight for
  Smart Compset competitive analysis, Business Intelligence for portfolio
  reporting, Parity Insight for distribution parity, Channel Manager for
  independent hotels, and newer AI products like KITT (AI receptionist)
  and Connect AI (ChatGPT direct-booking app). The platform processes 1.7
  billion hotel rates per day across 300,000+ profiled competitor hotels.
  Lighthouse exposes a public, subscription-gated Integration API
  (api.mylighthouse.com, v3.1) for hotel customers and certified
  technology partners — covering Hotels, Markets, Rates, Demand, Ranking,
  Reviews, Parity, and Market Insight — and runs a partner program with
  20+ named integrations including Mews, Infor, Duetto, Cendyn, Ideas,
  Atomize, SHR Group, and Cloudbeds. Revenue model is subscription SaaS
  sold by sales engagement; pricing is not published publicly.
